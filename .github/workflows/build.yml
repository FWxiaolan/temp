name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install PySide6 opencv-python numpy pillow openvino
      - name: Build with Nuitka (Windows)
        run: |
          nuitka --standalone --enable-plugin=pyside6 --enable-plugin=multiprocessing --enable-plugin=numpy --enable-plugin=anti-bloat --enable-console --windows-uac-admin --windows-icon-from-ico=icon.ico --include-data-file=icon.ico=icon.ico --include-package=openvino --include-package-data=openvino --output-dir=dist --output-filename=FaceRollCall.exe --follow-imports --lto=yes --jobs=4 --python-flag=no_site --assume-yes-for-downloads main.py
      - name: List files after build
        run: |
          echo "Checking build output:"
          if (Test-Path "dist/main.dist") { 
            echo "Build successful! Files in dist/main.dist:"
            dir dist/main.dist
          } else {
            echo "Build failed - dist/main.dist not found"
            echo "Checking dist directory:"
            if (Test-Path "dist") { dir dist } else { echo "dist directory not found" }
          }
      - name: Upload Windows artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FaceRollCall-Windows
          path: dist/main.dist/
          if-no-files-found: error
