build-windows:
  runs-on: windows-latest
  
  steps:
  - name: 检出代码
    uses: actions/checkout@v4

  - name: 设置 Python 环境
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'
      cache: 'pip'

  - name: 安装依赖
    run: |
      python -m pip install --upgrade pip
      pip install ultralytics PySide6 opencv-python nuitka ordered-set zstandard

  - name: 检查模型文件
    run: |
      if (-not (Test-Path "yolo26n-face.pt")) {
        Write-Error "模型文件 yolo26n-face.pt 不存在，请确保已上传到仓库"
        exit 1
      }
    shell: pwsh

  - name: 自动确认 Dependency Walker 下载并编译
    run: |
      # 使用 echo y 自动确认下载依赖分析工具
      echo y | nuitka --standalone `
        --enable-console `
        --follow-imports `
        --include-data-file=yolo26n-face.pt=yolo26n-face.pt `
        --include-data-file=icon.ico=icon.ico `
        --windows-icon-from-ico=icon.ico `
        --enable-plugin=pyside6 `
        --enable-plugin=opencv `
        --enable-plugin=multiprocessing `
        --output-dir=dist `
        main.py
    shell: pwsh

  - name: 打包发布文件
    run: |
      Compress-Archive -Path dist/main.dist/* -DestinationPath FaceRollCall_Windows.zip
    shell: pwsh

  - name: 上传构建产物
    uses: actions/upload-artifact@v4
    with:
      name: FaceRollCall-Windows
      path: FaceRollCall_Windows.zip
      retention-days: 30
